<!doctype html>
<html lang="it" data-theme="aurora">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sebastiano Laurent | Senior Mobile Developer (Flutter)</title>
    <meta
      name="description"
      content="CV professionale di Sebastiano Laurent: Senior Mobile Developer (Flutter) e Mobile Team Leader con esperienza in backend integration (C#/SQL/REST), delivery end-to-end e prodotti mobile ad ampia scala."
    />
    <meta property="og:title" content="Sebastiano Laurent - Senior Mobile Developer (Flutter) | Mobile Team Leader" />
    <meta
      property="og:description"
      content="Profilo mobile senior orientato a impatto, leadership tecnica, backend integration e delivery end-to-end."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sebastiano-laurent.github.io/cv/" />
    <meta property="og:locale" content="it_IT" />
    <link rel="canonical" href="https://sebastiano-laurent.github.io/cv/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="noise-layer" aria-hidden="true"></div>

    <header class="topbar">
      <div class="wrapper topbar-inner">
        <p class="brand">Sebastiano Laurent</p>
      </div>
    </header>

    <main class="wrapper cv" id="cv-root">
      <section class="hero card reveal">
        <div class="hero-grid">
          <button id="profile-flip" class="profile-flip" type="button" aria-label="Mostra foto o avatar">
            <span class="profile-flip-inner">
              <span class="profile-face profile-front">
                <img
                  src="./assets/user.webp"
                  alt="Foto profilo Sebastiano Laurent"
                  width="124"
                  height="124"
                  decoding="async"
                  fetchpriority="high"
                />
              </span>
              <span class="profile-face profile-back">
                <img
                  src="./assets/avatar.webp"
                  alt="Avatar Sebastiano Laurent"
                  width="124"
                  height="124"
                  loading="lazy"
                  decoding="async"
                />
              </span>
            </span>
          </button>

          <div class="hero-body">
            <h1 id="cv-name">Sebastiano Laurent</h1>
            <p class="title" id="cv-title"></p>
            <p class="summary" id="cv-summary"></p>
            <div class="contacts">
              <span class="location contact-chip chip-location" id="cv-location"></span>
              <a class="contact-chip chip-phone" href="tel:+393381001070">+39 338 1001070</a>
              <a class="contact-chip chip-email" href="mailto:sebastiano.laurent@outlook.com">sebastiano.laurent@outlook.com</a>
              <a class="contact-chip chip-linkedin" href="https://linkedin.com/in/sebastianolaurent" target="_blank" rel="noreferrer">linkedin.com/in/sebastianolaurent</a>
            </div>
          </div>
        </div>
      </section>

      <div class="top-boxes">
        <section class="card reveal">
          <h2 id="label-strengths"></h2>
          <ul class="strengths" id="cv-strengths"></ul>
        </section>

        <section class="card reveal ai-box" id="ai-card">
          <h2 id="label-skills-ai"></h2>
          <ul class="strengths ai-list" id="cv-skills-ai"></ul>
        </section>
      </div>

      <section class="layout">
        <div class="main-col">
          <section class="card reveal">
            <h2 id="label-experience"></h2>
            <div id="cv-experience"></div>
          </section>
          <section class="card reveal project-box">
            <h2 id="label-project"></h2>
            <div id="cv-project"></div>
          </section>
        </div>

        <aside class="rail">
          <section class="card reveal">
            <h2 id="label-skills-mobile"></h2>
            <ul id="cv-skills-mobile"></ul>
          </section>
          <section class="card reveal">
            <h2 id="label-skills-backend"></h2>
            <ul id="cv-skills-backend"></ul>
          </section>
          <section class="card reveal">
            <h2 id="label-skills-devops"></h2>
            <ul id="cv-skills-devops"></ul>
          </section>
          <section class="card reveal">
            <h2 id="label-skills-leadership"></h2>
            <ul id="cv-skills-leadership"></ul>
          </section>
          <section class="card reveal">
            <h2 id="label-education"></h2>
            <p id="cv-education"></p>
          </section>
          <section class="card reveal">
            <h2 id="label-languages"></h2>
            <ul id="cv-languages"></ul>
          </section>
        </aside>
      </section>

      <section class="card reveal impact-card">
        <h2 id="label-impact"></h2>
        <div class="impact-grid" id="cv-impact"></div>
      </section>
    </main>

    <footer class="footer-bar">
      <div class="wrapper footer-shell">
        <div class="footer-row footer-row-top">
          <div class="footer-group footer-segment" role="group" aria-label="Appearance">
            <span id="footer-label-theme" class="footer-label"></span>
            <button id="btn-theme-light" type="button" class="footer-btn" data-theme="light"></button>
            <button id="btn-theme-dark" type="button" class="footer-btn" data-theme="dark"></button>
            <button id="btn-theme-auto" type="button" class="footer-btn" data-theme="auto"></button>
          </div>
        </div>

        <div class="footer-divider"></div>

        <div class="footer-row footer-row-bottom">
          <div class="footer-meta">
            <span id="footer-copy"></span>
            <a id="footer-link-contact" href="mailto:sebastiano.laurent@outlook.com"></a>
            <a id="footer-link-linkedin" href="https://linkedin.com/in/sebastianolaurent" target="_blank" rel="noreferrer"></a>
          </div>

          <div class="footer-group footer-segment" role="group" aria-label="Language">
            <span id="footer-label-language" class="footer-label"></span>
            <button id="btn-lang-it" type="button" class="footer-btn" data-lang="it"></button>
            <button id="btn-lang-en" type="button" class="footer-btn" data-lang="en"></button>
          </div>
        </div>
      </div>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
